name: Tests

on:
  pull_request:
    branches: [ master ]

jobs:
  laravel-tests:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3]

    name: PHP${{ matrix.php }}

    steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{matrix.php}}
  
    - uses: actions/checkout@v3
    - name: Install Dependencies
      run: |
        composer install --no-interaction --no-scripts --no-suggest --no-progress --prefer-dist

    - name: Run Tests
      run: vendor/bin/phpunit
